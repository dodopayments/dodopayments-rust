name: Release Please
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Publish in this same run when a release was just cut: a release created
      # with GITHUB_TOKEN does not trigger `on: release` workflows, so a separate
      # publish workflow would never fire automatically.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ steps.release.outputs.release_created }}

      - name: Publish to crates.io
        if: ${{ steps.release.outputs.release_created }}
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
